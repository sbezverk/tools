syntax = "proto3";

//Path: Cisco-IOS-XR-ip-rib-oper:rib/vrfs/vrf/afs/af/safs/saf/ip-rib-route-table-names/ip-rib-route-table-name/ribtph-entries/ribtph-entry

package cisco_ios_xr_ip_rib_oper.rib.vrfs.vrf.afs.af.safs.saf.ip_rib_route_table_names.ip_rib_route_table_name.ribtph_entries.ribtph_entry;

option go_package = "github.com/sbezverk/tools/telemetry_feeder/proto/xr-rib/split/cisco_ios_xr_ip_rib_oper/rib/vrfs/vrf/afs/af/safs/saf/ip_rib_route_table_names/ip_rib_route_table_name/ribtph_entries/ribtph_entry;ribtph_entry";

// Information of an event that occured to a Route
message rib_edm_tph_db_entry_KEYS {
    string vrf_name = 1;
    string af_name = 2;
    string saf_name = 3;
    string route_table_name = 4;
    string id = 5;
}

message rib_edm_tph_db_entry {
    // The type of update that occured
    string update_type = 50;
    // The time the event occured
    uint64 time = 51;
    // Route information of the update
    rib_edm_route route = 52;
}

// SRv6 SID Format Info
message mgmt_srv6_sid_fmt {
    // Format type
    string type = 1;
    // Format description
    string description = 2;
}

// SRv6 Endpoint Behavior Info
message mgmt_srv6_endpoint_behavior {
    // Behavior type
    string type = 1;
    // Behavior description
    string description = 2;
    // IANA assigned value
    uint32 iana_type = 3;
}

// SRv6 Headend Behavior Info
message mgmt_srv6_headend_behavior {
    // Behavior type
    string type = 1;
    // Behavior description
    string description = 2;
}

// SRv6 SID
message mgmt_srv6_sid {
    // SID value
    string sid = 1;
}

// InternalID context NHG key name
message mgmt_rib_iid_ctx_nhg_key_name_t {
    // Name
    string name = 1;
}

message mgmt_rib_iid_ctx_nhg_key {
    string internal_id_context_nhg_key_type = 1;
    // InternalID context for NHG name
    mgmt_rib_iid_ctx_nhg_key_name_t nhg_name = 2;
    // InternalID context for FRR-NHG name
    mgmt_rib_iid_ctx_nhg_key_name_t frrnhg_name = 3;
}

message rib_in6_addr_t {
    string value = 1;
}

message rib_edm_ip_addr_t {
    string afi = 1;
    // No address family
    uint32 none = 2;
    // IPv4 address type
    string ipv4 = 3;
    // IPv6 address type
    rib_in6_addr_t ipv6 = 4;
}

// IPv4/IPv6 IP address and Prefix length
message rib_edm_ip_pfx_t {
    // IPv4/IPv6 address
    rib_edm_ip_addr_t ip_address = 1;
    // Prefix length
    uint32 prefix_length = 2;
}

// Information of L2 Info attribute in path
message rib_edm_path_l2_info {
    // L2 Cross Connect ID for this path
    uint32 xcid = 1;
    // L2 AC Interface
    string ac_interface = 2;
    // L2 Split Horizon Group ID
    uint32 split_horizon_group_id = 3;
    // L2 Bridge ID
    uint32 bridge_id = 4;
}

// Information of Via aft ID attribute in path
message rib_edm_path_via_aft_id {
    // AFT ID for this path
    uint64 aft_id = 1;
    // VRF ID for this path
    uint32 vrf_id = 2;
    // Type of AFT ID
    string type = 3;
    // VRF name
    string vrf_name = 4;
}

// Information of Path Grouping
message rib_edm_path_grouping_info {
    // Grouping ID for this path
    uint32 grouping_id = 1;
}

// MAC address type
message MacAddressType {
    string value = 1;
}

// Information of IP tunnel Info attribute in path
message rib_edm_path_ip_tunnel_info {
    // Tunnel is auto created
    bool auto_created = 1;
    // Tunnel Type
    string tunnel_type = 2;
    // VXLAN Network Identifier Flags
    uint32 flags = 3;
    // Egress VXLAN Network Identifier
    uint32 e_vni = 4;
    // Tunnel ID
    uint32 tunnel_id = 5;
    // VXLAN Network Identifier
    uint32 vni = 6;
    // Remote Tunnel End Point ID
    uint64 rtep_id = 7;
    // Source MAC Address
    MacAddressType src_mac = 8;
    // Destination MAC Address
    MacAddressType dst_mac = 9;
    // Source IP Address
    rib_edm_ip_addr_t src_ip_addr = 10;
    // Destination IP Address
    rib_edm_ip_addr_t dst_ip_addr = 11;
    // DSCP
    uint32 dscp = 12;
    // TTL
    uint32 ttl = 13;
}

// Information of Segment List Identifier
message rib_edm_path_sl_id_info {
    // Segment List ID type
    string type = 1;
    // Segment List ID
    uint32 sl_id = 2;
}

// Information of path Class of Service
message rib_edm_path_cos {
    // Class of Service type
    string type = 1;
    // Class of Service value
    uint32 value = 2;
    // Indication if Class of Service is default
    bool is_default = 3;
}

// Information of Primary/Secondary Path attribute
message rib_edm_prim_sec {
    // Path set identifier
    uint32 path_set_id = 1;
    // Path set activation priority
    string set_activation_prio = 2;
    // Path down indication
    bool path_down = 3;
}

// Information of via NHG
message rib_edm_path_via_nhg {
    // NHG key
    mgmt_rib_iid_ctx_nhg_key key = 1;
    // IID value
    uint32 iid = 2;
}

// HW_ACK attributes of an object
message rib_edm_obj_hw_ack {
    // Transaction ID for the operation
    uint64 transaction_id = 1;
    // Operation ID set by route-producers for the object
    uint64 operation_id = 2;
    // The object operation result
    string operation_result = 3;
    // HWAA response for the object
    string ack_response = 4;
    // Event history
    repeated string events = 5;
    // Timestamp of the last HWAA request sent in nanoseconds
    uint64 hwaa_req_ts = 6;
    // Latency of the last responded HWAA request latency in nanoseconds
    uint64 hwaa_req_latency = 7;
    // The object operation type
    string operation_type = 8;
    // ACK state requested
    string ack_state_requested = 9;
    // Unsolicited ACK state
    string unsolicited_state = 10;
    // In case of NACK, FIB reason
    string fib_error_reason = 11;
    // In case of NACK, Node ID
    uint32 nack_node_id = 12;
    // Is object in NACK state
    bool is_nack = 13;
}

// Route Hardware ACK information
message rib_edm_route_hw_ack {
    // Hardware ACK object information
    rib_edm_obj_hw_ack hwack_obj = 1;
}

// Information related to Via-SRv6-SID
message rib_edm_via_srv6_sid {
    // Via-SRv6-SID value
    string sid = 1;
    // FIB Resolution length
    uint32 resolution_length = 2;
}

// RIB path's SRv6 related private information
message rib_edm_path_srv6_private_info {
}

// RIB path's SRv6 related information
message rib_edm_path_srv6_info {
    // SRv6 Carrier Format
    mgmt_srv6_sid_fmt s_rv6_carrier_format = 1;
    // List of SRv6 Carriers with one or more SIDs
    repeated mgmt_srv6_sid s_rv6_carrier = 2;
    // SRv6 headend behavior/type info
    mgmt_srv6_headend_behavior s_rv6_headend_behavior = 3;
}

// RIB path private information
message rib_edm_path_private_info {
}

message ospf_area_id_td {
    string area_id_type = 1;
    // IP address format
    string id_ip_addr = 2;
    // Integer format
    uint32 id_int = 3;
}

message path_attr_td {
    string path_attr_type = 1;
    // Subscriber Parent Interface for this path
    string subscriber_parent_interface = 2;
    // L2 Cross Connect ID for this path
    uint32 xc_id = 3;
    // SPAN Diagnostics Interface for this path
    string span_diag_interface = 4;
    // VXLAN Network Identifier for this path
    uint32 vxlan_network_id = 5;
    // Label associated with this path
    uint32 route_label = 6;
}

// Information of a rib path
message rib_edm_path {
    // Nexthop
    rib_edm_ip_addr_t address = 1;
    // Infosource
    rib_edm_ip_addr_t information_source = 2;
    // Interface handle for the path's nexthop
    string interface_name = 3;
    // Metrics
    uint32 metric = 4;
    // Load Metrics
    uint32 load_metric = 5;
    // Minimum netmask length of recursive resolving route
    uint32 minimum_recurse_length = 6;
    // Looping path
    bool looped = 7;
    // The table to which the next hop belongs
    uint32 next_hop_table_id = 8;
    // VRF Name of the nh table
    string next_hop_vrf_name = 9;
    // NH table name
    string next_hop_table_name = 10;
    // NH Address Family
    string next_hop_afi = 11;
    // NH Sub Address Family
    string next_hop_safi = 12;
    // Tunnel ID associated with this path
    uint32 tunnel_id = 13;
    // Path id of this path
    uint32 path_id = 14;
    // Path id of this path's backup
    uint32 backup_path_id = 15;
    // For backup paths, the number of active paths protected by the backup path
    uint32 ref_cnt_of_backup = 16;
    // NHID associated with this path
    uint32 next_hop_id = 17;
    // NHID references
    uint32 next_hop_id_refcount = 18;
    // Path NHID used for StatsID
    uint32 stats_next_hop_id = 19;
    // Stats NHID references
    uint32 stats_next_hop_id_refcount = 20;
    // OSPF area associated with the path
    ospf_area_id_td ospf_area_id = 21;
    // Remote backup node address
    repeated rib_edm_ip_addr_t remote_backup_addr = 22;
    // Outgoing label stack for this path
    repeated uint32 label_stack = 23;
    // binding Label for this path
    uint32 binding_label = 24;
    // Fib nhid encap id
    uint64 nexthop_id_feid = 25;
    // Fib mpls encap id
    uint64 mpls_feid = 26;
    // Path attribute
    path_attr_td path_attribute = 27;
    // Path Viability
    bool viable = 28;
    // Internal ID attribute
    rib_edm_ip_addr_t iid = 29;
    // L2 Info for this path
    rib_edm_path_l2_info l2_info = 30;
    // Grouping Info for this path
    rib_edm_path_grouping_info path_grouping_info = 31;
    // SRv6 related information
    rib_edm_path_srv6_info s_rv6_info = 32;
    // Via-SRv6-SID value
    rib_edm_via_srv6_sid via_s_rv6_sid = 33;
    // IP Tunnel Info for this path
    rib_edm_path_ip_tunnel_info ip_tunnel_info = 34;
    // Via AFT ID info for this path
    rib_edm_path_via_aft_id via_aft_id = 35;
    // Segment List ID Info
    rib_edm_path_sl_id_info segment_list_id_info = 36;
    // Path Class of Service information
    rib_edm_path_cos path_co_s = 37;
    // Primary/Secondary path information
    rib_edm_prim_sec prim_sec = 38;
    // Via NHG info for this path
    rib_edm_path_via_nhg via_nhg = 39;
}

// Algorithm ID to Local Label information
message rib_edm_algo_label_set {
    // Algorithm Identifier
    uint32 algorithm_id = 1;
    // Local label
    uint32 label = 2;
    // Route Metric associated with Algorithm Identifier
    uint32 metric = 3;
}

// Information of local label for route head
message rib_edm_local_label {
    // Protocol Name
    string protocol_name = 1;
    // Client ID
    uint32 client_id = 2;
    // Redist only
    uint32 redist_only = 3;
    // Local label
    uint32 label = 4;
    // Distance
    uint32 distance = 5;
    // Metric
    uint32 metric = 6;
    // List of Algorithm Labels associated with this Prefix
    repeated rib_edm_algo_label_set algorithm_label = 7;
}

// Merge data
message rib_edm_merge_data {
    // Local label
    uint32 label = 1;
    // Withhold Advertisements
    bool withhold_advertisement = 2;
}

// Merge object produced by a single protocol
message rib_edm_merge_object {
    // Protocol Name
    string protocol_name = 1;
    // Merge Data
    rib_edm_merge_data merge_data = 2;
    // Client ID
    uint32 client_id = 3;
    // Stale
    uint32 stale = 4;
    // Mirrored
    uint32 mirrored = 5;
    // Distance
    uint32 distance = 6;
}

// Information of SRv6 Local SID associated with route head
message rib_edm_srv6_rw_opcode {
    // Owning Protocol Name
    string protocol_name = 1;
    // Owning Client ID
    uint32 client_id = 2;
    // Owning Protocol ID
    uint32 protocol_id = 3;
    // Locator Identifier
    uint32 locator_id = 4;
    // Opcode Identifier
    uint32 sid_opcode = 5;
    // Stale
    bool stale = 6;
    // Mirrored
    bool mirrored = 7;
    // Delayed Delete of Route
    bool delayed_delete = 8;
}

// Information of Local IID associated with route head
message rib_edm_iid_rw {
    // Owning Protocol Name
    string protocol_name = 1;
    // Owning Client ID
    uint32 client_id = 2;
    // Owning Protocol ID
    uint32 protocol_id = 3;
    // Internal ID as value
    uint32 iid_value = 4;
    // Number of references to this object
    uint32 reference_count = 5;
    // Stale
    bool stale = 6;
    // Mirrored
    bool mirrored = 7;
}

// RIB route's SRv6 related information
message rib_edm_route_srv6_info {
    // Route corresponds to an SRv6 remote locator
    bool is_s_rv6_locator = 1;
    // SRv6 Algo corresponding to SRv6 remote locator
    uint32 s_rv6_locator_algo = 2;
    // SRv6 Endpoint behavior/type
    mgmt_srv6_endpoint_behavior s_rv6_endpoint_behavior = 3;
    // SRv6 Format
    mgmt_srv6_sid_fmt s_rv6_format = 4;
}

// Information about a producer of merge data
message rib_edm_merge_prod_info {
    // Producer Protocol ID
    uint32 protocol_id = 1;
    // Producer protocol name
    string protocol_name = 2;
    // Distance
    uint32 distance = 3;
}

// The active merge data stored for a route head
message rib_edm_route_act_merge_info {
    // Merge data
    rib_edm_merge_data merge_data = 1;
    // Label producer info
    rib_edm_merge_prod_info label_prod_info = 2;
    // Withhold Advertisements producer info
    rib_edm_merge_prod_info wthld_adverts_prod_info = 3;
}

// RIB route's AFT info
message rib_edm_route_aft_info {
    // AFT ID for this route
    uint64 aft_id = 1;
    // VRF ID for this route
    uint32 vrf_id = 2;
    // Transaction ID
    uint64 transaction_id = 3;
    // VRF Name
    string vrf_name = 4;
}

// RIB drop route info
message rib_edm_drop_route_info {
    // Starting timestamp for delay-update-to-drop
    uint64 start_time = 1;
    // Time since started for delay-update-to-drop (in seconds)
    uint32 time_since_started = 2;
    // Timestamp for updating drop route to FIB
    uint64 update_time = 3;
}

// Information of a rib route head and rib proto route
message rib_edm_route {
    // Type of the route - prefix or label
    string type = 1;
    // Route prefix
    rib_edm_ip_pfx_t prefix = 2;
    // Route version, incremented by one on each active route change
    uint32 route_version = 3;
    // Protocol advertising the route
    uint32 protocol_id = 4;
    //  Name of Protocol
    string protocol_name = 5;
    // Instance name
    string instance = 6;
    // Client adding the route to RIB
    uint32 client_id = 7;
    // Mirrored
    bool mirrored = 8;
    // Type of route installed in RIB
    uint32 route_type = 9;
    // Route priority
    uint32 priority = 10;
    // SVD Type of route
    uint32 svd_type = 11;
    // Type of route associated with L2 Service
    uint32 l2_route_type = 12;
    // Sub protocol ID
    uint32 sub_protocol_id = 13;
    // Route flags
    uint32 flags = 14;
    // Extended Route flags
    uint64 extended_flags = 15;
    // Opaque proto specific info
    uint32 tag = 16;
    // Distance of the route
    uint32 distance = 17;
    // Diversion distance of the route
    uint32 diversion_distance = 18;
    // Route metric
    uint32 metric = 19;
    // BGP Attribute ID
    uint32 attribute_identity = 20;
    // BGP Traffic Index
    uint32 traffic_index = 21;
    // IP precedence for this route
    uint32 route_precedence = 22;
    // Route qos group
    uint32 qos_group = 23;
    // Flow tag for this route
    uint32 flow_tag = 24;
    // Forward Class
    uint32 fwd_class = 25;
    // Number of pic paths in this route
    uint32 pic_count = 26;
    // Is the route active or backup
    bool active = 27;
    // Is the route unviable
    bool unviable = 28;
    // Is the route in potential install (the route update is held back to ensure lossless updates requirements are met)
    bool potential = 29;
    // Route has potential updates (updates that are held back to ensure lossless updates requirements are met)
    bool has_potential = 30;
    // Route has a diversion path
    bool diversion = 31;
    // Diversion route protocol name
    string diversion_proto_name = 32;
    // Age of route (seconds)
    uint32 route_age = 33;
    // Local label of the route
    uint32 route_label = 34;
    // Label producer protocol ID
    uint32 label_proto_id = 35;
    // Label producer protocol name
    string label_proto_name = 36;
    // Route Version
    uint32 version = 37;
    // Table Version
    uint64 tbl_version = 38;
    // Route modification time(nanoseconds)
    uint64 route_modify_time = 39;
    // Fib per-prefix encap id
    uint64 prefix_feid = 40;
    // List of Algorithm Labels associated with this Prefix
    repeated rib_edm_algo_label_set algorithm_label = 41;
    // Should the route be redistributed to FIB
    bool no_fib_redist = 42;
    // Flexible Algorithm associated with route
    uint32 flexible_algorithm = 43;
    // Table id
    uint32 table_id = 44;
    // Hardware ACK information
    repeated rib_edm_route_hw_ack hw_ack = 45;
    // SRv6 related information
    rib_edm_route_srv6_info s_rv6_info = 46;
    // Route AFT info
    rib_edm_route_aft_info aft = 47;
    // Path(s) of the route
    repeated rib_edm_path route_path = 48;
}

